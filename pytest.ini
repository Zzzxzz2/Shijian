[pytest]
testpaths = tests
norecursedirs = tests/e2e
asyncio_mode = auto
filterwarnings =
    ignore:Please use `import python_multipart`:PendingDeprecationWarning
    ignore:datetime.datetime.utcnow\(\) is deprecated:DeprecationWarning
    ignore:cannot collect test class.*because it has a __init__ constructor:pytest.PytestCollectionWarning
    ignore:API_KEY_ENCRYPTION_KEY is not set.*:RuntimeWarning
