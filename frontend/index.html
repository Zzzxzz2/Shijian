  /* === 变体 A：霓虹赛博 === */
  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .subtitle {
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
    padding: 0 24px;
  }
  .subtitle::before,
  .subtitle::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 40px;
    height: 1px;
  }
  .subtitle::before {
    right: 100%;
    background: linear-gradient(to left, transparent, #00ffff);
  }
  .subtitle::after {
    left: 100%;
    background: linear-gradient(to right, transparent, #a855f7);
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 260px;
    padding: 16px 22px;
    background: rgba(0,0,0,0.35);
    border: 1px solid;
    border-image: linear-gradient(135deg, #00ffff 0%, #a855f7 100%) 1;
    border-radius: 8px;
    color: #c8d0e0;
    text-decoration: none;
    font-size: 15px;
    letter-spacing: 3px;
    transition: all 0.3s ease;
    position: relative;
  }

  .card:hover {
    background: rgba(0,0,0,0.5);
    color: #fff;
    transform: translateY(-2px);
    box-shadow:
      0 0 12px rgba(0,255,255,0.15),
      0 0 24px rgba(168,85,247,0.10);
  }

  .card .arrow {
    font-size: 16px;
    color: #00ffff;
    transition: all 0.3s ease;
  }

  .card:hover .arrow {
    transform: translateX(5px);
    text-shadow: 0 0 8px rgba(0,255,255,0.6);
  }

  .card.placeholder {
    opacity: 0.18;
    cursor: default;
    pointer-events: none;
  }

<body>

<div id="stars"></div>
<div id="stars2"></div>
<div id="stars3"></div>
<div id="stars4"></div>
<div id="stars5"></div>
<div id="stars6"></div>

<div class="container">
  <div class="subtitle">Projects</div>
  <div class="cards">
    <a class="card" href="/app.html#/login">
      试剑
      <span class="arrow">→</span>
    </a>
    <div class="card placeholder">即将上线 …</div>
  </div>
</div>

<script src="/js/analytics.js"></script>
<script>
  // Track landing page visit
  if (window.__analytics__) {
    window.__analytics__.trackEnter('/');
  }
</script>

<div id="analytics-entry">浏览统计</div>

<div id="email-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:999; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
  <div style="background:rgba(20,22,35,0.95); border:1px solid rgba(0,255,255,0.12); border-radius:10px; padding:30px; max-width:340px; width:90%; text-align:center;">
    <div style="color:#e5e7eb; font-size:15px; margin-bottom:6px;">请求访问权限</div>
    <div style="color:#00ffff; font-size:12px; margin-bottom:20px;">─</div>
    <div id="modal-msg" style="color:#9ca3af; font-size:13px; margin-bottom:20px; line-height:1.6;">验证邮件将发送至你的邮箱<br>点击下方按钮确认</div>
    <button id="modal-send" style="width:100%; padding:10px; background:rgba(0,255,255,0.08); border:1px solid rgba(0,255,255,0.25); color:#00ffff; border-radius:6px; cursor:pointer; font-size:13px;">发送验证邮件</button>
    <button id="modal-close" style="margin-top:10px; background:none; border:none; color:#6b7280; cursor:pointer; font-size:11px;">关闭</button>
  </div>
</div>

<script>
(function(){
  var clickCount = 0;
  var stage = 'normal';
  var seq = [1,2,3,4,1,2,3,4];
  var input = [];

  function quad(e) {
    if (e.clientX < innerWidth/2 && e.clientY < innerHeight/2) return 1;
    if (e.clientX >= innerWidth/2 && e.clientY < innerHeight/2) return 2;
    if (e.clientX < innerWidth/2 && e.clientY >= innerHeight/2) return 3;
    return 4;
  }

  function spark(e) {
    var d = document.createElement('div');
    d.style.cssText = 'position:fixed;width:4px;height:4px;background:#fff;border-radius:50%;pointer-events:none;z-index:999;left:'+(e.clientX-2)+'px;top:'+(e.clientY-2)+'px;animation:sparkFade 0.8s ease-out forwards;box-shadow:0 0 8px #fff;';
    document.body.appendChild(d);
    setTimeout(function(){ d.remove(); }, 900);
  }

  function starburst() {
    stage = 'starburst';
    [4,5,6].forEach(function(i){ document.getElementById('stars'+i).style.opacity='0.7'; });
    ['lt','rt','lb','rb'].forEach(function(pos){
      var m = document.createElement('div');
      var s = 'position:fixed;width:44px;height:44px;pointer-events:none;z-index:20;';
      if (pos==='lt') s+='top:0;left:0;border-right:1px solid rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.03);';
      if (pos==='rt') s+='top:0;right:0;border-left:1px solid rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.03);';
      if (pos==='lb') s+='bottom:0;left:0;border-right:1px solid rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.03);';
      if (pos==='rb') s+='bottom:0;right:0;border-left:1px solid rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.03);';
      m.style.cssText = s;
      m.className = 'qm';
      document.body.appendChild(m);
    });
  }

  function qFlash(q) {
    var f = document.createElement('div');
    f.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:998;animation:qFlash 0.5s ease-out forwards;background:radial-gradient(circle at '+(q===1||q===3?'25%':'75%')+' '+(q===1||q===2?'25%':'75%')+',rgba(0,255,255,0.06) 0%,transparent 50%)';
    document.body.appendChild(f);
    setTimeout(function(){ f.remove(); }, 600);
  }

  function showEntry() {
    stage = 'unlocked';
    var e = document.getElementById('analytics-entry');
    e.style.opacity = '1';
    e.style.pointerEvents = 'auto';
  }

  document.body.addEventListener('click', function(e){
    if (e.target.closest('#email-modal') || e.target.closest('.card')) return;
    if (stage === 'normal') {
      clickCount++;
      spark(e);
      if (clickCount >= 10) starburst();
    } else if (stage === 'starburst') {
      var q = quad(e);
      if (q === seq[input.length]) {
        input.push(q);
        qFlash(q);
        if (input.length === 8) showEntry();
      }
    }
  });

  var modal = document.getElementById('email-modal');
  document.getElementById('analytics-entry').addEventListener('click', function(){ modal.style.display='flex'; });
  document.getElementById('modal-close').addEventListener('click', function(){ modal.style.display='none'; });
  document.getElementById('modal-send').addEventListener('click', async function(){
    var btn = this;
    var msg = document.getElementById('modal-msg');
    btn.disabled = true;
    btn.textContent = '发送中...';
    try {
      var r = await fetch('/api/analytics/send-link', {method:'POST'});
      if (r.ok) { msg.textContent='验证邮件已发送，请查收（10 分钟有效）'; msg.style.color='#4ade80'; btn.style.display='none'; }
      else { var d = await r.json(); throw new Error(d.detail||'发送失败'); }
    } catch(e) { msg.textContent = '发送失败：' + e.message; msg.style.color='#ef4444'; btn.disabled=false; btn.textContent='重试'; }
  });
})();
</script>
