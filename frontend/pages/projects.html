<!-- Project list page -->
<div class="max-w-6xl mx-auto px-4 py-6">
  <!-- Top bar -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-gray-800">项目列表</h1>
    <button id="new-project-btn"
      class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
      + 新建项目
    </button>
  </div>

  <!-- Search -->
  <div class="mb-4">
    <input id="search-input" type="text" placeholder="搜索项目..."
      class="w-full max-w-md px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm" />
  </div>

  <!-- Project table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-100">
          <th class="text-left px-4 py-3 font-medium text-gray-500">项目名称</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">描述</th>
          <th class="text-center px-4 py-3 font-medium text-gray-500">用例数</th>
          <th class="text-center px-4 py-3 font-medium text-gray-500">状态</th>
        </tr>
      </thead>
      <tbody id="project-list">
        <tr><td colspan="4" class="text-center py-12 text-gray-400">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="flex items-center justify-center gap-2 mt-4"></div>
</div>

<!-- New project modal -->
<div id="new-project-modal" class="fixed inset-0 bg-black/30 hidden items-center justify-center z-40">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
    <h3 class="text-lg font-bold text-gray-800 mb-4">新建项目</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">项目名称 *</label>
        <input id="np-name" type="text"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">描述</label>
        <textarea id="np-desc" rows="2"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">被测系统地址</label>
        <input id="np-url" type="url" placeholder="https://example.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm" />
        <p class="text-xs text-gray-400 mt-1">执行 API 测试时的基准地址，用例中的相对路径会拼接在此地址后</p>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button id="np-cancel"
        class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 border border-gray-300 rounded-lg transition-colors">取消</button>
      <button id="np-confirm"
        class="px-4 py-2 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors">创建</button>
    </div>
  </div>
</div>
