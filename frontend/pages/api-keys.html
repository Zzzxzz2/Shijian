<div class="max-w-5xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">API Key 管理</h1>
    <button id="add-key-btn"
      class="px-4 py-2 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors">+ 添加 Key</button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-200">
          <th class="text-left px-4 py-3 font-medium text-gray-600">Provider</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">模型</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">API Key</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600 hidden md:table-cell">Base URL</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">状态</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600 hidden md:table-cell">最后测试</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">操作</th>
        </tr>
      </thead>
      <tbody id="api-key-list">
        <tr><td colspan="7" class="text-center py-12 text-gray-400">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Key modal -->
<div id="add-key-modal" class="fixed inset-0 bg-black/30 hidden items-center justify-center z-40">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
    <h3 class="text-lg font-bold text-gray-800 mb-4">添加 API Key</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Provider *</label>
        <select id="ak-provider"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="mimo">Mimo</option>
          <option value="glm">GLM</option>
          <option value="qwen">Qwen</option>
          <option value="kimi">Kimi</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">API Key *</label>
        <input id="ak-key" type="password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Base URL</label>
        <input id="ak-base-url" type="text"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm"
          placeholder="https://api.deepseek.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">模型</label>
        <input id="ak-model" type="text"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm"
          placeholder="deepseek-chat" />
        <p class="text-xs text-gray-400 mt-1">AI 使用的模型名称，如 deepseek-chat、gpt-4o、glm-4-plus</p>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <input id="ak-edit-id" type="hidden" value="" />
      <button id="ak-cancel"
        class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">取消</button>
      <button id="ak-save"
        class="px-4 py-2 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors">保存</button>
    </div>
  </div>
</div>
