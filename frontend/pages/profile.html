<div class="max-w-2xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">个人中心</h1>

  <!-- User info card -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">账户信息</h2>
    <div class="space-y-3">
      <div class="flex items-center">
        <span class="w-24 text-sm text-gray-500">用户名</span>
        <span id="profile-username" class="text-gray-800 font-medium">-</span>
      </div>
      <div class="flex items-center">
        <span class="w-24 text-sm text-gray-500">角色</span>
        <span id="profile-role" class="text-gray-800">-</span>
      </div>
      <div class="flex items-center">
        <span class="w-24 text-sm text-gray-500">注册时间</span>
        <span id="profile-created" class="text-gray-800">-</span>
      </div>
    </div>
  </div>

  <!-- Change password -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">修改密码</h2>
    <form id="change-pwd-form" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1">当前密码</label>
        <input type="password" id="old-password" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">新密码</label>
        <input type="password" id="new-password" required minlength="6"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
        <p class="text-xs text-gray-400 mt-1">至少 6 位</p>
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">确认新密码</label>
        <input type="password" id="confirm-password" required minlength="6"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
      </div>
      <button type="submit"
        class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors text-sm font-medium">
        保存修改
      </button>
    </form>
  </div>
</div>
