<div class="max-w-4xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <a href="#/projects" class="text-gray-400 hover:text-gray-600 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-gray-800">新建测试执行</h1>
      <p id="project-name" class="text-sm text-gray-500 mt-0.5">项目：<span class="font-medium"></span></p>
    </div>
  </div>

  <!-- Filter + select all -->
  <div class="flex items-center justify-between mb-4">
    <label class="flex items-center gap-2 text-sm text-gray-600">
      <input id="select-all" type="checkbox" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500" />
      全选
    </label>
    <select id="case-filter"
      class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
      <option value="">全部</option>
      <option value="API">API</option>
      <option value="UI">UI</option>
      <option value="Perf">Perf</option>
    </select>
  </div>

  <!-- Case list -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-200">
          <th class="w-10 px-3 py-3"></th>
          <th class="text-left px-3 py-3 font-medium text-gray-600">名称</th>
          <th class="text-left px-3 py-3 font-medium text-gray-600">类型</th>
          <th class="text-left px-3 py-3 font-medium text-gray-600 hidden md:table-cell">来源</th>
        </tr>
      </thead>
      <tbody id="case-list">
        <tr><td colspan="4" class="text-center py-12 text-gray-400">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Execute button -->
  <div class="mt-6 text-right">
    <button id="start-run-btn"
      class="px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors">开始执行</button>
  </div>
</div>
