<!-- Login/Register page -->
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
    <!-- Login form -->
    <div id="login-form" class="">
      <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">登录</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">用户名</label>
          <input id="login-username" type="text"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
            placeholder="请输入用户名" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">密码</label>
          <input id="login-password" type="password"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
            placeholder="请输入密码" />
        </div>
        <button id="login-btn"
          class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
          登录
        </button>
        <div class="relative my-4">
          <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-200"></span></div>
          <div class="relative flex justify-center"><span class="bg-white px-3 text-xs text-gray-400">或者</span></div>
        </div>
        <button id="guest-btn"
          class="w-full border border-gray-300 hover:bg-gray-50 text-gray-600 font-medium py-2.5 rounded-lg transition-colors text-sm">
          访客查看
        </button>
        <div class="text-center mt-4">
          <a id="goto-register" href="#" class="text-sm text-primary-600 hover:text-primary-700">没有账号？注册</a>
        </div>
      </div>
    </div>

    <!-- Register form (hidden initially) -->
    <div id="register-form" class="hidden">
      <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">注册</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">用户名</label>
          <input id="reg-username" type="text"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
            placeholder="请输入用户名" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">密码</label>
          <input id="reg-password" type="password"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
            placeholder="请输入密码" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">确认密码</label>
          <input id="reg-confirm" type="password"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
            placeholder="再次输入密码" />
        </div>
        <button id="register-btn"
          class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
          注册
        </button>
        <div class="text-center">
          <a id="goto-login" href="#" class="text-sm text-primary-600 hover:text-primary-700">已有账号？登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
