<!-- Project detail page -->
<div class="max-w-6xl mx-auto px-4 py-6">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <a href="#/projects" class="text-gray-400 hover:text-gray-600 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 id="project-title" class="text-xl font-bold text-gray-800">项目详情</h1>
    <div class="flex items-center gap-2 ml-auto">
      <button id="edit-project-btn" class="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">编辑</button>
      <button id="delete-project-btn" class="px-3 py-1.5 text-sm border border-red-300 text-red-600 hover:bg-red-50 rounded-lg transition-colors">删除</button>
    </div>
  </div>

  <!-- Auth config section -->
  <div class="mb-6 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div id="auth-config-toggle" class="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-50 transition-colors">
      <div class="flex items-center gap-2">
        <svg class="w-4 h-4 text-gray-400 transition-transform" id="auth-config-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        <span class="text-sm font-medium text-gray-700">认证配置</span>
        <span id="auth-config-badge" class="hidden text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">已启用</span>
      </div>
    </div>
    <div id="auth-config-panel" class="hidden border-t border-gray-100 p-4 space-y-3">
      <div class="flex items-center gap-2">
        <input type="checkbox" id="ac-enabled" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500" />
        <label for="ac-enabled" class="text-sm text-gray-700">启用认证</label>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">认证方式</label>
          <select id="ac-method" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
            <option value="login">调用登录接口</option>
            <option value="token">固定 Token</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Header 名</label>
          <input id="ac-header-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" value="Authorization" />
        </div>
      </div>

      <!-- Login method fields -->
      <div id="ac-login-fields" class="space-y-3">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">登录接口 URL</label>
          <input id="ac-login-url" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono" placeholder="/api/login" />
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">请求体 (JSON)</label>
            <textarea id="ac-login-body" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono resize-none" placeholder='{"username":"demo","password":"123456"}'></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Token 在响应中的字段路径</label>
            <input id="ac-token-path" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono" value="token" />
          </div>
        </div>
      </div>

      <!-- Token method fields -->
      <div id="ac-token-fields" class="hidden space-y-3">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Token 值</label>
          <textarea id="ac-token-value" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono resize-none" placeholder="eyJhbGciOiJIUzI1NiIs..."></textarea>
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Header 值格式 <span class="text-gray-300 font-normal">{token} 会被替换为实际 token</span></label>
        <input id="ac-header-format" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono" value="Bearer {token}" />
      </div>

      <div class="flex items-center gap-2 pt-2 border-t border-gray-100">
        <button id="ac-test-btn" class="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">测试认证</button>
        <button id="ac-save-btn" class="px-3 py-1.5 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors">保存</button>
        <span id="ac-status" class="text-xs text-gray-400"></span>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex border-b border-gray-200 mb-6">
    <button class="tab-btn px-5 py-2.5 text-sm font-medium transition-colors border-b-2 border-primary-600 -mb-px text-primary-600" data-tab="cases">测试用例</button>
    <button class="tab-btn px-5 py-2.5 text-sm font-medium transition-colors text-gray-500 hover:text-gray-700" data-tab="runs">执行历史</button>
    <button class="tab-btn px-5 py-2.5 text-sm font-medium transition-colors text-gray-500 hover:text-gray-700" data-tab="schedules">定时调度</button>
    <button class="tab-btn px-5 py-2.5 text-sm font-medium transition-colors text-gray-500 hover:text-gray-700" data-tab="docs">文档</button>
  </div>

  <!-- Cases tab content -->
  <div id="tab-cases" class="tab-content">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <a id="ai-plan-btn" href="#/projects/4/ai-plan"
          class="hidden px-3 py-1.5 text-sm bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition-colors">AI 生成测试计划</a>
        <select id="tag-filter" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          <option value="">全部标签</option>
        </select>
        <select id="case-filter" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          <option value="">全部类型</option>
          <option value="API">API</option>
          <option value="UI">UI</option>
          <option value="Perf">Perf</option>
        </select>
        <button id="execute-by-tag-btn" disabled
          class="px-3 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-lg transition-colors">按标签执行</button>
        <button id="execute-cases-btn" disabled
          class="px-3 py-1.5 text-sm bg-green-600 hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-lg transition-colors">执行选中用例</button>
        <button id="batch-delete-cases-btn" disabled
          class="px-3 py-1.5 text-sm bg-red-600 hover:bg-red-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-lg transition-colors">删除选中</button>
      </div>
      <div class="flex items-center gap-2">
        <button id="export-cases-btn" class="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">导出</button>
        <button id="import-cases-btn" class="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">导入</button>
        <button id="new-case-btn" class="bg-primary-600 hover:bg-primary-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">+ 新建用例</button>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-gray-50 border-b border-gray-100">
          <th class="w-10 px-3 py-3"><input type="checkbox" id="select-all-cases" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500" /></th>
          <th class="text-left px-4 py-3 font-medium text-gray-500">名称</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500">类型</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">来源</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">创建时间</th>
          <th class="text-center px-4 py-3 font-medium text-gray-500">操作</th>
        </tr></thead>
        <tbody id="case-list"><tr><td colspan="6" class="text-center py-12 text-gray-400">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Runs tab content -->
  <div id="tab-runs" class="tab-content hidden">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-gray-50 border-b border-gray-100">
          <th class="text-left px-4 py-3 font-medium text-gray-500">状态</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500">执行时间</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">结果摘要</th>
          <th class="text-center px-4 py-3 font-medium text-gray-500">操作</th>
        </tr></thead>
        <tbody id="run-list"><tr><td colspan="4" class="text-center py-12 text-gray-400">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Schedules tab content -->
  <div id="tab-schedules" class="tab-content hidden">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-medium text-gray-600">定时调度</h3>
      <button id="new-schedule-btn" class="bg-primary-600 hover:bg-primary-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">+ 新建调度</button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-gray-50 border-b border-gray-100">
          <th class="text-left px-4 py-3 font-medium text-gray-500">标签</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500">Cron 表达式</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">状态</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">上次执行</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500 hidden md:table-cell">下次执行</th>
          <th class="text-center px-4 py-3 font-medium text-gray-500">操作</th>
        </tr></thead>
        <tbody id="schedule-list"><tr><td colspan="6" class="text-center py-12 text-gray-400">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Docs tab content -->
  <div id="tab-docs" class="tab-content hidden">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-medium text-gray-600">已上传文档</h3>
      <button id="upload-doc-btn" class="bg-primary-600 hover:bg-primary-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">+ 上传文档</button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-gray-50 border-b border-gray-100">
          <th class="text-left px-4 py-3 font-medium text-gray-500">文件名</th>
          <th class="text-left px-4 py-3 font-medium text-gray-500">上传时间</th>
          <th class="text-center px-4 py-3 font-medium text-gray-500">操作</th>
        </tr></thead>
        <tbody id="doc-list"><tr><td colspan="3" class="text-center py-12 text-gray-400">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Schedule modal -->
<div id="schedule-modal" class="fixed inset-0 bg-black/30 hidden items-center justify-center z-40">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
    <h3 id="schedule-modal-title" class="text-lg font-bold text-gray-800 mb-4">新建调度</h3>
    <input type="hidden" id="sm-edit-id" value="" />
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">标签</label>
        <select id="sm-tag" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          <option value="">全部用例</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Cron 表达式</label>
        <input id="sm-cron" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm font-mono" placeholder="0 9 * * *" />
        <div class="flex flex-wrap gap-1 mt-1.5">
          <button type="button" class="cron-preset px-2 py-0.5 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-600" data-cron="0 9 * * *">每天9点</button>
          <button type="button" class="cron-preset px-2 py-0.5 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-600" data-cron="0 9 * * 1">每周一9点</button>
          <button type="button" class="cron-preset px-2 py-0.5 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-600" data-cron="0 9 1 * *">每月1号9点</button>
          <button type="button" class="cron-preset px-2 py-0.5 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-600" data-cron="0 */6 * * *">每6小时</button>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" id="sm-enabled" checked class="rounded border-gray-300 text-primary-600 focus:ring-primary-500" />
        <label for="sm-enabled" class="text-sm text-gray-700">启用</label>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button id="sm-cancel" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
      <button id="sm-confirm" class="px-4 py-2 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg">保存</button>
    </div>
  </div>
</div>

<!-- Project edit modal -->
<div id="project-edit-modal" class="fixed inset-0 bg-black/30 hidden items-center justify-center z-40">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
    <h3 class="text-lg font-bold text-gray-800 mb-4">编辑项目</h3>
    <div class="space-y-3">
      <div><label class="block text-sm font-medium text-gray-600 mb-1">项目名称 *</label>
        <input id="pe-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm" /></div>
      <div><label class="block text-sm font-medium text-gray-600 mb-1">描述</label>
        <textarea id="pe-desc" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm resize-none"></textarea></div>
      <div><label class="block text-sm font-medium text-gray-600 mb-1">被测系统地址</label>
        <input id="pe-url" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm" placeholder="https://example.com" /></div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button id="pe-cancel" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
      <button id="pe-confirm" class="px-4 py-2 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg">保存</button>
    </div>
  </div>
</div>

<!-- Case modal (structured form, shared for create + edit) -->
<div id="case-modal" class="fixed inset-0 bg-black/30 hidden items-center justify-center z-40">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
    <h3 id="case-modal-title" class="text-lg font-bold text-gray-800 mb-4">新建用例</h3>
    <input type="hidden" id="cm-edit-id" value="" />
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-sm font-medium text-gray-600 mb-1">用例名称 *</label>
          <input id="cm-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm" /></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">类型</label>
          <select id="cm-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
            <option value="API">API</option><option value="UI">UI</option><option value="Perf">Perf</option>
          </select></div>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" id="cm-skip-auth" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500" />
        <label for="cm-skip-auth" class="text-sm text-gray-600">跳过认证注入 <span class="text-gray-400 font-normal">(用于登录接口、公开接口等不需要 Authorization 头的场景)</span></label>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">标签 <span class="text-gray-400 font-normal">(逗号分隔)</span></label>
        <input id="cm-tags" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm" placeholder="smoke, login, critical" />
      </div>
      <div id="cm-api-fields">
        <div class="grid grid-cols-4 gap-3">
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Method</label>
            <select id="cm-method" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
              <option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option><option>PATCH</option>
            </select></div>
          <div class="col-span-3"><label class="block text-sm font-medium text-gray-600 mb-1">URL</label>
            <input id="cm-url" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm" placeholder="/api/login" /></div>
        </div>
        <div class="mt-3"><label class="block text-sm font-medium text-gray-600 mb-1">Headers <span class="text-gray-400 font-normal">(key: value, 每行一个)</span></label>
          <textarea id="cm-headers" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm resize-none font-mono" placeholder="Content-Type: application/json"></textarea></div>
        <div class="mt-3"><label class="block text-sm font-medium text-gray-600 mb-1">Body <span class="text-gray-400 font-normal">(JSON)</span></label>
          <textarea id="cm-body" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm resize-none font-mono" placeholder='{"username":"test","password":"123"}'></textarea></div>
      </div>
      <!-- UI Steps (shown when type=UI) -->
      <div id="cm-ui-fields" class="hidden">
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-gray-600">操作步骤</label>
          <button id="cm-add-step" class="text-xs text-primary-600 hover:text-primary-800 font-medium">+ 添加步骤</button>
        </div>
        <div id="cm-steps" class="space-y-2"></div>
      </div>
      <!-- Assertions -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-gray-600">断言规则</label>
          <button id="cm-add-assertion" class="text-xs text-primary-600 hover:text-primary-800 font-medium">+ 添加断言</button>
        </div>
        <div id="cm-assertions" class="space-y-2"></div>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button id="cm-cancel" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
      <button id="cm-confirm" class="px-4 py-2 text-sm bg-primary-600 hover:bg-primary-700 text-white rounded-lg">保存</button>
    </div>
  </div>
</div>
